<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>照片评分器</title>
    <link rel="stylesheet" href="src/styles.css" />
  </head>
  <body>
    <main class="shell">
      <section class="hero" aria-labelledby="page-title">
        <div class="hero-copy">
          <p class="eyebrow">AI 照片评分</p>
          <h1 id="page-title">照片评分器</h1>
          <p class="lede">
            上传一张照片，先用模拟 AI 反馈快速看看曝光、构图、光影和人文题材表现。
          </p>
        </div>

        <div class="app-grid" aria-label="照片评分工具">
          <section class="upload-panel" aria-labelledby="upload-title">
            <div class="panel-heading">
              <div>
                <p class="section-kicker">照片</p>
                <h2 id="upload-title">上传图片</h2>
              </div>
              <span class="status-pill" id="uploadStatus">未选择</span>
            </div>

            <label class="drop-zone" id="dropZone">
              <input id="photoInput" type="file" accept="image/*" />
              <span class="drop-zone-title">选择一张照片</span>
              <span class="drop-zone-copy">支持 JPG、PNG、WebP 或 GIF</span>
            </label>

            <div class="preview-frame" id="previewFrame">
              <img id="photoPreview" alt="上传照片预览" />
              <div class="preview-empty" id="previewEmpty">
                <span class="preview-mark">评</span>
                <p>图片预览会显示在这里</p>
              </div>
            </div>

            <button class="primary-button" id="rateButton" type="button" disabled>
              开始评分
            </button>
          </section>

          <section class="results-panel" aria-labelledby="results-title">
            <div class="panel-heading">
              <div>
                <p class="section-kicker">反馈</p>
                <h2 id="results-title">模拟 AI 评分</h2>
              </div>
              <span class="status-pill ready">Mock</span>
            </div>

            <div class="score-block" aria-live="polite">
              <span class="score-label">总分</span>
              <strong id="scoreValue">--</strong>
              <span id="scoreCaption">上传照片后开始评分。</span>
            </div>

            <div class="feedback-list">
              <article class="feedback-item">
                <span class="feedback-label">曝光</span>
                <p id="exposureFeedback">等待图片。</p>
              </article>
              <article class="feedback-item">
                <span class="feedback-label">构图</span>
                <p id="compositionFeedback">等待图片。</p>
              </article>
              <article class="feedback-item">
                <span class="feedback-label">光影</span>
                <p id="lightShadowFeedback">等待图片。</p>
              </article>
              <article class="feedback-item">
                <span class="feedback-label">人文题材</span>
                <p id="humanityFeedback">等待图片。</p>
              </article>
              <article class="feedback-item summary-item">
                <span class="feedback-label">汇总</span>
                <p id="summaryFeedback">等待图片。</p>
              </article>
            </div>
          </section>
        </div>
      </section>
    </main>

    <script src="src/app.js"></script>
  </body>
</html>
